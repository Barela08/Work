<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>Work Tracker SIMPLE FIX</title>
<style>
body{font-family:sans-serif;background:#222;color:#fff;padding:15px}
button{padding:10px;margin:5px}
input{padding:8px;margin:5px}
</style>
</head>
<body><h2>Work Tracker (Simple & Working)</h2><input type="number" id="amount" placeholder="₹ amount">
<button onclick="addDay()">+ Add Day</button>
<button onclick="pay()">Receive ₹</button>
<button onclick="advance()">Advance</button><h3>Total Days: <span id="days">0</span></h3>
<h3>Total Amount: ₹<span id="total">0</span></h3>
<h3>Remaining: ₹<span id="remaining">0</span></h3>
<h3>Advance: ₹<span id="adv">0</span></h3><ul id="list"></ul><script>
let store = JSON.parse(localStorage.getItem('store')) || {
  days: [], payments: [], advance: 0
};

function save(){
  localStorage.setItem('store', JSON.stringify(store));
  render();
}

function addDay(){
  let amt = Number(document.getElementById('amount').value) || 0;
  store.days.push({date:new Date().toLocaleDateString(), amount:amt});
  document.getElementById('amount').value = '';
  save();
}

function pay(){
  let amt = Number(prompt('Kitna mila?'))||0;
  if(!amt) return;
  store.payments.push({amount:amt});
  save();
}

function advance(){
  let amt = Number(prompt('Advance?'))||0;
  if(!amt) return;
  store.advance += amt;
  save();
}

function del(i){
  store.days.splice(i,1);
  save();
}

function render(){
  let total = 0;
  let list = document.getElementById('list');
  list.innerHTML='';

  store.days.forEach((d,i)=>{
    total += d.amount;
    let li = document.createElement('li');
    li.innerHTML = `${d.date} ₹${d.amount} <button onclick="del(${i})">X</button>`;
    list.appendChild(li);
  });

  let paid = store.payments.reduce((a,b)=>a+b.amount,0);
  let remaining = total - paid - store.advance;

  document.getElementById('days').textContent = store.days.length;
  document.getElementById('total').textContent = total;
  document.getElementById('remaining').textContent = remaining;
  document.getElementById('adv').textContent = store.advance;
}

render();
</script></body>
</html>
