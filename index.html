<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Tracker</title>
<style>
body{font-family:'Segoe UI';background:#eef2f7;padding:15px;max-width:520px;margin:auto}
h1{text-align:center}
.card{background:#fff;padding:12px;margin-top:12px;border-radius:12px;box-shadow:0 3px 10px rgba(0,0,0,0.08)}
button{padding:10px;border:none;border-radius:8px;width:100%;margin-top:6px;font-weight:600}
.green{background:#27ae60;color:#fff}
.blue{background:#2980b9;color:#fff}
.red{background:#e74c3c;color:#fff}
input{padding:8px;width:100%;margin-top:6px;border-radius:6px;border:1px solid #ccc}
.row{display:flex;justify-content:space-between;align-items:center;gap:8px}
.small{font-size:13px;color:#666}
.dayAmt{font-weight:bold;color:#2c3e50}
</style>
</head>
<body><h1>Work Tracker</h1><button class="green" onclick="addToday()">+ Add Today</button> <input type="date" onchange="addCustom(this.value)">

<div class="card">
<input id="bulk" placeholder="Bulk Amount">
<button class="blue" onclick="applyBulk()">Apply to All Days</button>
</div><div id="days"></div><div class="card">
<p>Total Days: <b id="totalDays"></b></p>
<p>Total Amount: ₹<b id="totalAmount"></b></p>
<p>Total Advance: ₹<b id="totalAdvance"></b></p>
<p>Remaining: ₹<b id="remaining"></b></p>
</div><button class="green" onclick="addPayment()">Receive Payment</button>

<div class="card">
<h3>Add Advance</h3>
<input id="advAmt" placeholder="Enter advance amount">
<button class="blue" onclick="addAdvanceManual()">Add Advance</button>
</div><button class="blue" onclick="window.print()">Print</button>

<div class="card">
<h3>Payment History</h3>
<div id="payments"></div>
</div><div class="card">
<h3>Advance History</h3>
<div id="advances"></div>
</div><script>
let data=JSON.parse(localStorage.getItem("tracker"))||{days:[],payments:[],advances:[]};

function save(){localStorage.setItem("tracker",JSON.stringify(data));render()}

function addToday(){let t=new Date().toISOString().split('T')[0];data.days.push({date:t,amount:""});save()}

function addCustom(d){if(!d)return;data.days.push({date:d,amount:""});save()}

function updateAmount(i,v){data.days[i].amount=v;save()}

function deleteDay(i){data.days.splice(i,1);save()}

function applyBulk(){let v=document.getElementById("bulk").value;data.days.forEach(d=>d.amount=v);save()}

function total(){return data.days.reduce((s,d)=>s+Number(d.amount||0),0)}
function paid(){return data.payments.reduce((s,p)=>s+p.amount,0)}
function adv(){return data.advances.reduce((s,a)=>s+a.amount,0)}
function remaining(){return total()-paid()-adv()}

function addPayment(){let a=Number(prompt("Enter payment"));if(!a)return;data.payments.push({amount:a,date:new Date().toLocaleDateString()});save()}

function addAdvanceManual(){let a=Number(document.getElementById("advAmt").value);if(!a)return;
if(a>remaining()){alert("Advance exceeds remaining");return}
data.advances.push({amount:a,date:new Date().toLocaleDateString()});document.getElementById("advAmt").value="";save()}

function deleteAdvance(i){data.advances.splice(i,1);save()}

function render(){
let dDiv=document.getElementById("days");dDiv.innerHTML="";

data.days.forEach((d,i)=>{
let amt=d.amount||0;
dDiv.innerHTML+=`
<div class="card">
<div class="row">
<div style="flex:1">
<div><b>${d.date}</b></div>
<div class="small">Amount: <span class="dayAmt">₹${amt}</span></div>
<input placeholder="Edit amount" value="${d.amount}" oninput="updateAmount(${i},this.value)">
</div>
<button class="red" onclick="deleteDay(${i})">X</button>
</div>
</div>`
});

document.getElementById("totalDays").innerText=data.days.length;
document.getElementById("totalAmount").innerText=total();
document.getElementById("totalAdvance").innerText=adv();
document.getElementById("remaining").innerText=remaining();

document.getElementById("payments").innerHTML=data.payments.map(p=>`• ${p.date} - ₹${p.amount}`).join("<br>");

document.getElementById("advances").innerHTML=data.advances.map((a,i)=>`
<div class="row">
<span>• ${a.date} - ₹${a.amount}</span>
<button class="red" onclick="deleteAdvance(${i})">Delete</button>
</div>`).join("");
}

render();
</script></body>
</html>
