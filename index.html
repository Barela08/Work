<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Tracker FINAL WORKING</title>
<style>
body{font-family:'Segoe UI';margin:0;background:linear-gradient(135deg,#667eea,#764ba2);color:white}
.container{padding:20px}
.card{background:rgba(255,255,255,0.1);border-radius:15px;padding:15px;margin-bottom:15px}
button{padding:12px;border:none;border-radius:10px;margin:5px;cursor:pointer}
.add{background:#00c853;color:white}
.pay{background:#2962ff;color:white}
.adv{background:#ff9800;color:white}
.del{background:#ff5252;color:white}
input{padding:10px;border-radius:10px;border:none;margin:5px}
</style>
</head>
<body>
<div class="container">
<h2>💼 Work Tracker (100% FIXED)</h2><div class="card">
<input type="number" id="amount" placeholder="₹ amount">
<br>
<button class="add" id="addBtn">+ Add Day</button>
<button class="pay" onclick="receivePayment()">Receive ₹</button>
<button class="adv" onclick="addAdvance()">Add Advance</button>
</div><div class="card">
<h3>📊 Summary</h3>
<p>Total Days: <span id="days"></span></p>
<p>Total Amount: ₹<span id="total"></span></p>
<p>Remaining: ₹<span id="remaining"></span></p>
<p>Advance: ₹<span id="advance"></span></p>
</div><div class="card">
<h3>📅 Work List</h3>
<ul id="list"></ul>
</div><div class="card">
<h3>💰 Payment History</h3>
<ul id="payments"></ul>
</div>
</div><script>
let store;
try {
  store = JSON.parse(localStorage.getItem('store')) || {days:[],payments:[],advance:0};
} catch {
  store = {days:[],payments:[],advance:0};
}

function save(){
  localStorage.setItem('store', JSON.stringify(store));
  render();
}

// SUPER SIMPLE ADD (NO BUG)
document.getElementById('addBtn').addEventListener('click', function(){
  const amtInput = document.getElementById('amount');
  const amount = Number(amtInput.value) || 0;

  const today = new Date().toLocaleDateString();

  store.days.push({date: today, amount: amount});

  amtInput.value = '';

  save();
});

function updateAmount(i,val){
  store.days[i].amount = Number(val)||0;
  save();
}

function deleteDay(i){
  if(confirm('Delete?')){
    store.days.splice(i,1);
    save();
  }
}

function receivePayment(){
  let amt = Number(prompt('Kitna paisa mila?'))||0;
  if(!amt) return;
  store.payments.push({date:new Date().toLocaleDateString(), amount:amt});
  save();
}

function addAdvance(){
  let amt = Number(prompt('Advance kitna liya?'))||0;
  if(!amt) return;
  store.advance += amt;
  save();
}

function render(){
  let total=0;
  const list=document.getElementById('list');
  list.innerHTML='';

  store.days.forEach((d,i)=>{
    total += Number(d.amount)||0;

    const li=document.createElement('li');
    li.innerHTML=`
      ${d.date}
      <input type="number" value="${d.amount}" onchange="updateAmount(${i},this.value)">
      <button class="del" onclick="deleteDay(${i})">X</button>
    `;
    list.appendChild(li);
  });

  let paidTotal = store.payments.reduce((a,b)=>a+(Number(b.amount)||0),0);
  let remaining = total - paidTotal - store.advance;

  document.getElementById('days').textContent = store.days.length;
  document.getElementById('total').textContent = total;
  document.getElementById('remaining').textContent = remaining;
  document.getElementById('advance').textContent = store.advance;

  const payList=document.getElementById('payments');
  payList.innerHTML='';

  store.payments.forEach(p=>{
    const li=document.createElement('li');
    li.textContent = `${p.date} - ₹${p.amount}`;
    payList.appendChild(li);
  });
}

render();
</script></body>
</html>
